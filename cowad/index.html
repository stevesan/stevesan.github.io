<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoWAD</title>
  <script type="module" crossorigin src="./assets/index-Bq_dKDRR.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-gXzdRM6_.css">
</head>
<body>

<div id="toolbar">
  <button class="tool-btn active" data-tool="select" title="Select / Move (S)">S</button>
  <button class="tool-btn" data-tool="draw"   title="Draw Sector (D)">D</button>
  <button class="tool-btn" data-tool="thing"  title="Place Thing (T)">T</button>
  <button id="view3d-btn" class="tool-btn" title="Toggle 3D View (Tab)">3D</button>
  <button id="thing-type-btn" class="thing-btn" title="Choose thing type"><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#0f0;vertical-align:middle;margin-right:4px;"></span>Player 1 Start</button>
  <div class="sep"></div>
  <label style="color:#888;font-size:11px;font-family:monospace;">Grid
    <select id="snap-size-sel" style="background:#222;color:#ccc;border:1px solid #444;font-size:11px;font-family:monospace;padding:2px;">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="4">4</option>
      <option value="8" selected>8</option>
      <option value="16">16</option>
      <option value="32">32</option>
      <option value="64">64</option>
    </select>
  </label>
  <div class="sep"></div>
  <button id="import-wad-btn" style="background:#1a1a2e;border:1px solid #446;color:#88f;padding:3px 10px;cursor:pointer;border-radius:3px;font-size:12px;font-family:monospace;">Import IWAD</button>
  <button id="wad-btn" style="background:#1a1a2e;border:1px solid #446;color:#88f;padding:3px 10px;cursor:pointer;border-radius:3px;font-size:12px;font-family:monospace;">Export WAD</button>
  <button id="json-export-btn" style="background:#1a1a2e;border:1px solid #446;color:#88f;padding:3px 10px;cursor:pointer;border-radius:3px;font-size:12px;font-family:monospace;">Save JSON</button>
  <button id="json-import-btn" style="background:#1a1a2e;border:1px solid #446;color:#88f;padding:3px 10px;cursor:pointer;border-radius:3px;font-size:12px;font-family:monospace;">Load JSON</button>
  <button id="play-btn" style="background:#2a1a1a;border:1px solid #644;color:#f88;padding:3px 10px;cursor:pointer;border-radius:3px;font-size:12px;font-family:monospace;">Play</button>
  <div class="overflow-menu">
    <button class="overflow-toggle" title="More actions">&#8943;</button>
    <div class="overflow-dropdown">
      <button id="record-btn">Record</button>
      <button id="clean-btn">Clean</button>
      <button id="overlap-btn">Check overlaps</button>
      <button id="clear-btn">Clear</button>
    </div>
  </div>
  <span id="coords">0, 0</span>
  <span id="users"></span>
  <button id="settings-btn" style="display:none;background:#222;border:1px solid #444;color:#888;padding:3px 6px;cursor:pointer;border-radius:3px;font-size:14px;line-height:1;" title="Firebase settings">&#9881;</button>
  <button id="connect-btn" style="display:none;background:#1a1a2e;border:1px solid #446;color:#88f;padding:3px 10px;cursor:pointer;border-radius:3px;font-size:12px;font-family:monospace;">Connect</button>
  <span id="status">Connecting…</span>
</div>

<div id="main">
  <div id="canvas-wrap"><canvas id="canvas"></canvas></div>
  <div id="panel">
    <div id="panel-empty">Nothing selected.</div>
    <div id="panel-content" style="display:none"></div>
  </div>
</div>

<div id="toast"></div>

<div id="record-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:#1a1a1a;border:1px solid #444;border-radius:6px;padding:16px;width:80vw;max-width:800px;max-height:80vh;display:flex;flex-direction:column;gap:8px;">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span style="color:#ccc;font-family:monospace;font-size:14px;">Recorded Test Case</span>
      <span style="display:flex;gap:6px;">
        <button id="record-copy-test" style="background:#1a1a2e;border:1px solid #446;color:#88f;padding:3px 10px;cursor:pointer;border-radius:3px;font-size:12px;font-family:monospace;">Copy Test</button>
        <button id="record-copy-json" style="background:#1a2a1a;border:1px solid #464;color:#8f8;padding:3px 10px;cursor:pointer;border-radius:3px;font-size:12px;font-family:monospace;">Copy JSON</button>
        <button id="record-close" style="background:#2a1a1a;border:1px solid #644;color:#f88;padding:3px 10px;cursor:pointer;border-radius:3px;font-size:12px;font-family:monospace;">Close</button>
      </span>
    </div>
    <textarea id="record-output" readonly style="flex:1;min-height:400px;background:#111;color:#cfc;border:1px solid #333;border-radius:3px;font-family:monospace;font-size:12px;padding:8px;resize:none;white-space:pre;overflow:auto;tab-size:2;"></textarea>
  </div>
</div>

<script>
// Only load Firebase SDK if user previously connected and has config saved
if (localStorage.getItem('cowad-firebase-connected') === 'true' && localStorage.getItem('cowad-firebase-config')) {
  document.write('<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"><\/script>');
  document.write('<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"><\/script>');
}
</script>
</body>
</html>
