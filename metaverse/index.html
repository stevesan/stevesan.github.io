<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metaverse</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    canvas { display: block; }

    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0, 0, 0, 0.55); color: #fff;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    #overlay.hidden { opacity: 0; }
    #overlay h1 { font-size: 1.4rem; margin-bottom: 10px; }
    #overlay p  { font-size: 0.8rem; color: rgba(255,255,255,0.6); }

#hud {
      position: fixed; bottom: 14px; left: 14px;
      color: rgba(255,255,255,0.9); font-size: 11px;
      line-height: 1.6;
      background: rgba(0,0,0,0.45);
      padding: 6px 10px;
      border-radius: 4px;
      white-space: pre;
    }
  </style>
</head>
<body>

<div id="overlay">
  <h1>Click to explore the metaverse yo</h1>
  <p>WASD — move &nbsp;|&nbsp; Mouse — look &nbsp;|&nbsp; Space / Q — up / down &nbsp;|&nbsp; Esc — release</p>
</div>
<div id="hud"></div>

<script type="importmap">
{
  "imports": {
    "three":          "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader }         from 'three/addons/loaders/GLTFLoader.js';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// ── URL params ────────────────────────────────────────────────────────────────
const sp        = new URLSearchParams(location.search);
const chunkX    = parseInt(sp.get('x') ?? '45', 10);
const chunkY    = parseInt(sp.get('y') ?? '67', 10);
const chunkUrl  = sp.get('chunkUrl'); // optional override, e.g. http://localhost:3000/chunk.gltf

const CHUNK  = 100; // meters

function chunkGltfUrls(cx, cy) {
  if (chunkUrl) return [chunkUrl];
  const base = `${cx}-${cy}.xyz/chunk.gltf`;
  return [
    `https://www.${base}`,
    `http://www.${base}`,
    `https://${base}`,
    `http://${base}`,
  ];
}

// ── Renderer ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.localClippingEnabled = true;   // required for per-material clipping
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ── Scene / camera ────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8ec8f0);
scene.fog = new THREE.Fog(0xb8dcf8, 250, 850);

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 2000);
camera.position.set(50, 8, 50);  // start above centre of origin chunk

// ── Lighting ──────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.65));

const sun = new THREE.DirectionalLight(0xfff6e0, 1.3);
sun.position.set(200, 500, 120);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far  = 1200;
sun.shadow.camera.left   = -400;
sun.shadow.camera.right  =  400;
sun.shadow.camera.top    =  400;
sun.shadow.camera.bottom = -400;
sun.shadow.bias = -0.001;
scene.add(sun);

const sky = new THREE.HemisphereLight(0x8ec8f0, 0x444433, 0.5);
scene.add(sky);

// ── First-person fly / noclip controls ───────────────────────────────────────
const controls = new PointerLockControls(camera, renderer.domElement);
scene.add(controls.getObject());

const overlay = document.getElementById('overlay');
document.addEventListener('click', e => { if (!controls.isLocked && !e.target.closest('#hud')) controls.lock(); });
controls.addEventListener('lock',   () => overlay.classList.add('hidden'));
controls.addEventListener('unlock', () => overlay.classList.remove('hidden'));

const MOVE_KEYS = new Set(['KeyW','KeyS','KeyA','KeyD','KeyE','KeyQ','Space','ShiftLeft','ShiftRight']);
const keys = new Set();
window.addEventListener('keydown', e => {
  if (MOVE_KEYS.has(e.code)) e.preventDefault();
  keys.add(e.code);
});
window.addEventListener('keyup', e => keys.delete(e.code));

// ── Chunk loading ─────────────────────────────────────────────────────────────
const loader        = new GLTFLoader();
const loadedChunks  = new Set(); // "cx,cy" keys that have been attempted

function ensureChunk(cx, cy) {
  const key = `${cx},${cy}`;
  if (loadedChunks.has(key)) return;
  loadedChunks.add(key);
  // World offset: cx/cy relative to origin chunk maps to world x/z
  const wx = (cx - chunkX) * CHUNK;
  const wz = (cy - chunkY) * CHUNK;
  loadChunk(cx, cy, wx, wz);
}

function ensureNeighbours(cx, cy) {
  for (let dy = -1; dy <= 1; dy++)
    for (let dx = -1; dx <= 1; dx++)
      ensureChunk(cx + dx, cy + dy);
}

// Load initial 3×3 around starting chunk
ensureNeighbours(chunkX, chunkY);

function clippingPlanes(wx, wz) {
  // Keep geometry inside [wx, wx+CHUNK] × [wz, wz+CHUNK] (X and Z axes).
  // THREE.Plane(n, c): keeps points where dot(n, p) + c >= 0, clips the rest.
  return [
    new THREE.Plane(new THREE.Vector3( 1, 0,  0), -wx),             // x >= wx
    new THREE.Plane(new THREE.Vector3(-1, 0,  0),  wx + CHUNK),     // x <= wx+100
    new THREE.Plane(new THREE.Vector3( 0, 0,  1), -wz),             // z >= wz
    new THREE.Plane(new THREE.Vector3( 0, 0, -1),  wz + CHUNK),     // z <= wz+100
  ];
}

function loadChunk(cx, cy, wx, wz) {
  const planes = clippingPlanes(wx, wz);
  const urls   = chunkGltfUrls(cx, cy);

  function tryNext(i) {
    if (i >= urls.length) {
      console.warn(`[chunk ${cx},${cy}] all URLs failed, showing fallback`);
      chunkResolvedUrl.set(`${cx},${cy}`, null);
      scene.add(makeFallbackChunk(wx, wz, planes));
      return;
    }
    loader.load(
      urls[i],
      gltf => {
        const root = gltf.scene;
        root.position.set(wx, 0, wz);
        root.traverse(node => {
          if (!node.isMesh) return;
          node.castShadow    = true;
          node.receiveShadow = true;
          if (Array.isArray(node.material)) {
            node.material = node.material.map(m => applyClip(m.clone(), planes));
          } else {
            node.material = applyClip(node.material.clone(), planes);
          }
        });
        chunkResolvedUrl.set(`${cx},${cy}`, urls[i]);
        scene.add(root);
      },
      undefined,
      () => {
        console.warn(`[chunk ${cx},${cy}] failed: ${urls[i]}`);
        tryNext(i + 1);
      }
    );
  }

  tryNext(0);
}

function makeFallbackChunk(wx, wz, planes) {
  const size   = 64;
  const cells  = 10;
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx    = canvas.getContext('2d');
  const cell   = size / cells;
  for (let row = 0; row < cells; row++) {
    for (let col = 0; col < cells; col++) {
      ctx.fillStyle = (row + col) % 2 === 0 ? '#fff' : '#222';
      ctx.fillRect(col * cell, row * cell, cell, cell);
    }
  }
  const tex        = new THREE.CanvasTexture(canvas);
  tex.repeat.set(1, 1);
  const mat        = new THREE.MeshBasicMaterial({ map: tex, clippingPlanes: planes });
  const geo        = new THREE.PlaneGeometry(CHUNK, CHUNK);
  const mesh       = new THREE.Mesh(geo, mat);
  mesh.rotation.x  = -Math.PI / 2;
  mesh.position.set(wx + CHUNK / 2, 0, wz + CHUNK / 2);
  return mesh;
}

function applyClip(mat, planes) {
  mat.clippingPlanes = planes;
  mat.clipShadows    = true;
  return mat;
}

// ── Animate ───────────────────────────────────────────────────────────────────
const chunkResolvedUrl = new Map(); // key: "cx,cy" → URL that loaded successfully

let lastCX = chunkX, lastCY = chunkY;

const clock  = new THREE.Clock();
const SPEED  = 20; // m/s base
const fwd    = new THREE.Vector3();
const right  = new THREE.Vector3();
const UP     = new THREE.Vector3(0, 1, 0);
const hud    = document.getElementById('hud');

function animate() {
  requestAnimationFrame(animate);

  const dt    = clock.getDelta();
  const speed = SPEED * dt * (keys.has('ShiftLeft') || keys.has('ShiftRight') ? 4 : 1);
  const yaw   = controls.getObject(); // position node

  if (controls.isLocked) {
    camera.getWorldDirection(fwd);
    right.crossVectors(fwd, UP).normalize();

    if (keys.has('KeyW')) yaw.position.addScaledVector(fwd,   speed);
    if (keys.has('KeyS')) yaw.position.addScaledVector(fwd,  -speed);
    if (keys.has('KeyA')) yaw.position.addScaledVector(right, -speed);
    if (keys.has('KeyD')) yaw.position.addScaledVector(right,  speed);
    if (keys.has('Space') || keys.has('KeyE')) yaw.position.y += speed;
    if (keys.has('KeyQ'))                      yaw.position.y -= speed;
    yaw.position.y = Math.max(1, yaw.position.y);
  }

  const p = camera.position;
  const curCX = chunkX + Math.floor(p.x / CHUNK);
  const curCY = chunkY + Math.floor(p.z / CHUNK);

  if (curCX !== lastCX || curCY !== lastCY) {
    lastCX = curCX;
    lastCY = curCY;
    ensureNeighbours(curCX, curCY);
    const next = new URLSearchParams(location.search);
    next.set('x', curCX);
    next.set('y', curCY);
    history.replaceState(null, '', '?' + next.toString());
  }
  const resolvedEntry = chunkResolvedUrl.get(`${curCX},${curCY}`);
  const domain = `${curCX}-${curCY}.xyz`;
  let urlHtml;
  if (!chunkResolvedUrl.has(`${curCX},${curCY}`)) {
    urlHtml = '(loading…)';
  } else if (resolvedEntry === null) {
    urlHtml = `Not found. Want to contribute this chunk? Buy <b>${domain}</b> and serve <b>chunk.gltf</b> from it.\nThis metaverse browser will try to load <b>${domain}/chunk.gltf</b>`;
  } else {
    urlHtml = `<a href="${resolvedEntry}" target="_blank" style="color:inherit">${resolvedEntry}</a>`;
  }
  hud.innerHTML =
    `xyz: ${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}\n` +
    `chunk: ${curCX}, ${curCY}  —  ${urlHtml}`;

  renderer.render(scene, camera);
}
animate();

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
